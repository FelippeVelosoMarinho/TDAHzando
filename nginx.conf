server {
    listen 80;
    server_name localhost;

    # Frontend Principal (Lume Chaos)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Backend (Lume Chaos Backend)
    location /api/ {
        # Como o backend roda no mesmo docker-compose, usamos o nome do container
        proxy_pass http://lume-chaos-backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Arquivos de Upload (Áudio)
    location /uploads/ {
        proxy_pass http://lume-chaos-backend:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========================================================
    # Futuras rotas do Ecossistema Lume
    # Para funcionar perfeitamente, os projetos v-maps e v-hair 
    # precisarão ter "base: '/maps/'" configurado no vite.config.js deles.
    # Quando for ligar as aplicações, comente as linhas "return 503"
    # e descomente o "proxy_pass".
    # ========================================================

    # Lume Maps
    location /maps/ {
        proxy_pass http://lume-maps-frontend:80/;
    }

    # Lume Hair
    location /hair {
        proxy_pass http://lume-hair-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Lume Cad
    location /cad/ {
        proxy_pass http://lume-cad-frontend:80/;
    }
}
