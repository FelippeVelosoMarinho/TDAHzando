version: '3.8'

services:
  lume-chaos-frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - lume-chaos-backend
    restart: unless-stopped
    networks:
      - lume-network

  lume-chaos-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
    networks:
      - lume-network

  # =======================================================
